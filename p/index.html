<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Helpy Profile</title>

  <!-- Generic OG tags (social crawlers see these) -->
  <meta property="og:title" content="Helpy - Neighborly Help" />
  <meta property="og:description" content="Real neighbors helping each other — right in your neighborhood." />
  <meta property="og:image" content="https://help-y.com/app-icon-512.png" />
  <meta property="og:site_name" content="Helpy" />
  <meta name="twitter:card" content="summary" />
  <meta name="twitter:image" content="https://help-y.com/app-icon-512.png" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", sans-serif;
      background: #f0f4ff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 48px 20px 64px;
    }
    .wordmark { font-size: 15px; font-weight: 700; color: #6366f1; letter-spacing: -0.3px; margin-bottom: 24px; }
    .card { background: #fff; border-radius: 28px; padding: 36px 28px 28px; max-width: 420px; width: 100%; box-shadow: 0 8px 32px rgba(99,102,241,0.1); text-align: center; }
    .avatar { width: 96px; height: 96px; border-radius: 50%; object-fit: cover; border: 3px solid #e0e7ff; margin-bottom: 16px; }
    .avatar-ph { width: 96px; height: 96px; border-radius: 50%; background: linear-gradient(135deg,#6366f1,#8b5cf6); font-size: 40px; line-height: 96px; margin: 0 auto 16px; }
    .name { font-size: 26px; font-weight: 700; color: #1e293b; letter-spacing: -0.5px; margin-bottom: 6px; }
    .bio { font-size: 15px; color: #64748b; line-height: 1.55; margin-bottom: 16px; }
    .rating-row { display: flex; align-items: center; justify-content: center; gap: 8px; margin-bottom: 24px; }
    .stars-display { color: #f59e0b; font-size: 20px; letter-spacing: 1px; }
    .rating-num { font-size: 18px; font-weight: 700; color: #1e293b; }
    .rating-sub { font-size: 14px; color: #94a3b8; }
    .cta { display: block; background: linear-gradient(135deg,#6366f1,#8b5cf6); color: #fff; text-decoration: none; padding: 16px; border-radius: 16px; font-size: 17px; font-weight: 700; margin-bottom: 28px; transition: opacity 0.15s; }
    .cta:hover { opacity: 0.9; }
    .reviews { text-align: left; border-top: 1px solid #f1f5f9; padding-top: 20px; }
    .reviews-label { font-size: 13px; font-weight: 600; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 14px; }
    .review { padding-bottom: 14px; margin-bottom: 14px; border-bottom: 1px solid #f8fafc; }
    .review:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
    .review-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; }
    .reviewer { font-size: 14px; font-weight: 600; color: #1e293b; }
    .review-stars { color: #f59e0b; font-size: 13px; }
    .review-body { font-size: 14px; color: #64748b; line-height: 1.5; }
    .footer { margin-top: 24px; font-size: 13px; color: #94a3b8; }
    .spinner-wrap { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 60vh; }
    .spinner { width: 40px; height: 40px; border: 3px solid #e0e7ff; border-top-color: #6366f1; border-radius: 50%; animation: spin 0.8s linear infinite; margin-bottom: 16px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-text { font-size: 15px; color: #64748b; }
    .error-text { font-size: 15px; color: #94a3b8; text-align: center; padding: 40px 20px; }
  </style>
</head>
<body>
  <div id="root">
    <div class="spinner-wrap">
      <div class="spinner"></div>
      <p class="loading-text">Loading profile&hellip;</p>
    </div>
  </div>

  <script>
  (function () {
    var ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imx3b21zdHp6bXllZ3BiaWRpYmZtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI4MTA1NjksImV4cCI6MjA4ODM4NjU2OX0.sZBrK88ecSJBstXNBa2UUAHhBxNfy9-Ssac1JPY9i2k';
    var APP_STORE = 'https://apps.apple.com/app/id6758919822';

    var id = window.location.hash.slice(1);
    if (!id) { window.location.href = 'https://help-y.com'; return; }

    var apiUrl = 'https://lwomstzzmyegpbidibfm.supabase.co/functions/v1/profile-page'
      + '?apikey=' + ANON_KEY
      + '&id=' + encodeURIComponent(id)
      + '&format=json';

    fetch(apiUrl)
      .then(function (r) { return r.json(); })
      .then(function (data) {
        if (data.error) { showError('Profile not found.'); return; }
        render(data);
      })
      .catch(function () { showError('Could not load profile. Please try again.'); });

    function esc(s) {
      return String(s || '')
        .replace(/&/g, '&amp;').replace(/</g, '&lt;')
        .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    function stars(r) {
      var f = Math.round(r);
      return '&#9733;'.repeat(f) + '&#9734;'.repeat(5 - f);
    }

    function render(p) {
      document.title = esc(p.name) + ' on Helpy';

      var avatarHtml = p.avatar
        ? '<img class="avatar" src="' + esc(p.avatar) + '" alt="' + esc(p.name) + '" />'
        : '<div class="avatar-ph">&#x1F3D8;&#xFE0F;</div>';

      var ratingHtml = (p.rating && p.ratingCount >= 1)
        ? '<div class="rating-row">'
          + '<span class="stars-display">' + stars(p.rating) + '</span>'
          + '<span class="rating-num">' + p.rating.toFixed(1) + '</span>'
          + '<span class="rating-sub">' + p.ratingCount + ' review' + (p.ratingCount !== 1 ? 's' : '') + '</span>'
          + '</div>'
        : '';

      var reviewsHtml = '';
      if (p.reviews && p.reviews.length > 0) {
        reviewsHtml = '<div class="reviews"><p class="reviews-label">What neighbors say</p>';
        p.reviews.forEach(function (r) {
          reviewsHtml += '<div class="review">'
            + '<div class="review-top">'
            + '<span class="reviewer">' + esc(r.rater_name) + '</span>'
            + '<span class="review-stars">' + stars(r.rating) + '</span>'
            + '</div>'
            + '<p class="review-body">' + esc(r.comment) + '</p>'
            + '</div>';
        });
        reviewsHtml += '</div>';
      }

      document.getElementById('root').innerHTML =
        '<p class="wordmark">&#x1F3D8;&#xFE0F; Helpy</p>'
        + '<div class="card">'
        + avatarHtml
        + '<h1 class="name">' + esc(p.name) + '</h1>'
        + (p.bio ? '<p class="bio">' + esc(p.bio) + '</p>' : '')
        + ratingHtml
        + '<a class="cta" href="' + APP_STORE + '">Open in Helpy &rarr;</a>'
        + reviewsHtml
        + '</div>'
        + '<p class="footer">Neighbors helping neighbors</p>';
    }

    function showError(msg) {
      document.getElementById('root').innerHTML = '<p class="error-text">' + msg + '</p>';
    }
  })();
  </script>
</body>
</html>
