<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Helpy Profile</title>
  <meta property="og:title" content="Helpy - Neighborly Help" />
  <meta property="og:description" content="Real neighbors helping each other — right in your neighborhood." />
  <meta property="og:image" content="https://help-y.com/app-icon-512.png" />
  <meta property="og:site_name" content="Helpy" />
  <meta name="twitter:card" content="summary" />
  <meta name="twitter:image" content="https://help-y.com/app-icon-512.png" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", sans-serif;
      background: linear-gradient(150deg, #1e1b4b 0%, #312e81 55%, #4338ca 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
      gap: 20px;
    }

    /* ── Card ── */
    .card {
      background: #ffffff;
      border-radius: 28px;
      padding: 36px 28px 32px;
      max-width: 380px;
      width: 100%;
      box-shadow:
        0 0 0 0.5px rgba(255,255,255,0.08),
        0 8px 16px rgba(0,0,0,0.12),
        0 32px 64px rgba(0,0,0,0.28);
      text-align: center;
    }

    /* ── Wordmark ── */
    .wordmark {
      font-size: 13px;
      font-weight: 600;
      color: #6366f1;
      letter-spacing: 0.2px;
      margin-bottom: 28px;
      opacity: 0.85;
    }

    /* ── Avatar ── */
    .avatar {
      width: 108px;
      height: 108px;
      border-radius: 50%;
      object-fit: cover;
      border: 4px solid #fff;
      box-shadow: 0 4px 20px rgba(99,102,241,0.25), 0 0 0 3px #e0e7ff;
      margin-bottom: 18px;
    }
    .avatar-ph {
      width: 108px;
      height: 108px;
      border-radius: 50%;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      font-size: 44px;
      line-height: 108px;
      margin: 0 auto 18px;
      box-shadow: 0 4px 20px rgba(99,102,241,0.3);
    }

    /* ── Name / Bio ── */
    .name {
      font-size: 26px;
      font-weight: 700;
      color: #0f172a;
      letter-spacing: -0.6px;
      margin-bottom: 6px;
    }
    .bio {
      font-size: 15px;
      color: #64748b;
      line-height: 1.55;
      margin-bottom: 20px;
      padding: 0 8px;
    }

    /* ── Rating pill ── */
    .rating-pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: #fffbeb;
      border: 1.5px solid #fde68a;
      border-radius: 100px;
      padding: 6px 16px;
      margin-bottom: 22px;
    }
    .stars { color: #f59e0b; font-size: 13px; letter-spacing: 1.5px; }
    .rating-num { font-size: 14px; font-weight: 700; color: #92400e; }
    .rating-sub { font-size: 13px; color: #b45309; }

    /* ── CTA ── */
    .cta {
      display: block;
      background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
      color: #fff;
      text-decoration: none;
      padding: 16px 24px;
      border-radius: 16px;
      font-size: 17px;
      font-weight: 700;
      letter-spacing: -0.2px;
      box-shadow: 0 8px 24px rgba(99,102,241,0.35);
      transition: transform 0.12s, box-shadow 0.12s;
    }
    .cta:hover { transform: translateY(-1px); box-shadow: 0 12px 28px rgba(99,102,241,0.4); }
    .cta:active { transform: translateY(0) scale(0.98); box-shadow: 0 4px 12px rgba(99,102,241,0.25); }

    /* ── Reviews ── */
    .reviews { margin-top: 24px; text-align: left; }
    .reviews-label {
      font-size: 11px;
      font-weight: 700;
      color: #cbd5e1;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 12px;
    }
    .review {
      background: #f8fafc;
      border-radius: 14px;
      padding: 14px 16px;
      margin-bottom: 8px;
    }
    .review:last-child { margin-bottom: 0; }
    .review-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; }
    .reviewer { font-size: 14px; font-weight: 600; color: #1e293b; }
    .review-stars { color: #f59e0b; font-size: 12px; letter-spacing: 1px; }
    .review-body { font-size: 14px; color: #64748b; line-height: 1.5; }

    /* ── Footer ── */
    .footer {
      font-size: 13px;
      color: rgba(255,255,255,0.4);
      letter-spacing: 0.1px;
    }

    /* ── Loading / Error ── */
    .spinner-wrap {
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      min-height: 50vh; gap: 16px;
    }
    .spinner {
      width: 40px; height: 40px;
      border: 3px solid rgba(255,255,255,0.15);
      border-top-color: rgba(255,255,255,0.8);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-text { font-size: 15px; color: rgba(255,255,255,0.6); }
    .error-text { font-size: 15px; color: rgba(255,255,255,0.5); text-align: center; padding: 40px 20px; }
  </style>
</head>
<body>
  <div id="root">
    <div class="spinner-wrap">
      <div class="spinner"></div>
      <p class="loading-text">Loading profile&hellip;</p>
    </div>
  </div>

  <script>
  (function () {
    var ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imx3b21zdHp6bXllZ3BiaWRpYmZtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI4MTA1NjksImV4cCI6MjA4ODM4NjU2OX0.sZBrK88ecSJBstXNBa2UUAHhBxNfy9-Ssac1JPY9i2k';
    var APP_STORE = 'https://apps.apple.com/app/id6758919822';

    var id = window.location.hash.slice(1);
    if (!id) { window.location.href = 'https://help-y.com'; return; }

    fetch('https://lwomstzzmyegpbidibfm.supabase.co/functions/v1/profile-page'
      + '?apikey=' + ANON_KEY + '&id=' + encodeURIComponent(id) + '&format=json')
      .then(function (r) { return r.json(); })
      .then(function (d) { d.error ? showError('Profile not found.') : render(d); })
      .catch(function () { showError('Could not load profile. Please try again.'); });

    function esc(s) {
      return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }
    function stars(r) {
      var f = Math.round(r);
      return '&#9733;'.repeat(f) + '&#9734;'.repeat(5 - f);
    }

    function render(p) {
      document.title = esc(p.name) + ' on Helpy';

      var avatarHtml = p.avatar
        ? '<img class="avatar" src="' + esc(p.avatar) + '" alt="' + esc(p.name) + '" />'
        : '<div class="avatar-ph">&#x1F3D8;&#xFE0F;</div>';

      var ratingHtml = (p.rating && p.ratingCount >= 1)
        ? '<div class="rating-pill">'
          + '<span class="stars">' + stars(p.rating) + '</span>'
          + '<span class="rating-num">' + p.rating.toFixed(1) + '</span>'
          + '<span class="rating-sub">&middot; ' + p.ratingCount + ' review' + (p.ratingCount !== 1 ? 's' : '') + '</span>'
          + '</div>'
        : '';

      var reviewsHtml = '';
      if (p.reviews && p.reviews.length > 0) {
        reviewsHtml = '<div class="reviews"><p class="reviews-label">What neighbors say</p>';
        p.reviews.forEach(function (r) {
          reviewsHtml +=
            '<div class="review">'
            + '<div class="review-top">'
            + '<span class="reviewer">' + esc(r.rater_name) + '</span>'
            + '<span class="review-stars">' + stars(r.rating) + '</span>'
            + '</div>'
            + '<p class="review-body">' + esc(r.comment) + '</p>'
            + '</div>';
        });
        reviewsHtml += '</div>';
      }

      document.getElementById('root').innerHTML =
        '<div class="card">'
        + '<p class="wordmark">&#x1F3D8;&#xFE0F; Helpy</p>'
        + avatarHtml
        + '<h1 class="name">' + esc(p.name) + '</h1>'
        + (p.bio ? '<p class="bio">' + esc(p.bio) + '</p>' : '')
        + ratingHtml
        + '<a class="cta" href="' + APP_STORE + '">Open in Helpy &rarr;</a>'
        + reviewsHtml
        + '</div>'
        + '<p class="footer">Real neighbors helping each other</p>';
    }

    function showError(msg) {
      document.getElementById('root').innerHTML = '<p class="error-text">' + esc(msg) + '</p>';
    }
  })();
  </script>
</body>
</html>
