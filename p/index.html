<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Helpy Profile</title>
  <meta property="og:title" content="Helpy - Neighborly Help" />
  <meta property="og:description" content="Real neighbors helping each other — right in your neighborhood." />
  <meta property="og:image" content="https://help-y.com/app-icon-512.png" />
  <meta property="og:site_name" content="Helpy" />
  <meta name="twitter:card" content="summary" />
  <meta name="twitter:image" content="https://help-y.com/app-icon-512.png" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", sans-serif;
      background: linear-gradient(160deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 56px 28px 48px;
      -webkit-font-smoothing: antialiased;
    }

    /* Wordmark */
    .wordmark {
      font-size: 13px;
      font-weight: 600;
      color: rgba(255,255,255,0.4);
      letter-spacing: 0.8px;
      text-transform: uppercase;
      margin-bottom: 32px;
    }

    /* Avatar */
    .avatar {
      width: 120px; height: 120px;
      border-radius: 50%;
      object-fit: cover;
      border: 3.5px solid rgba(255,255,255,0.85);
      box-shadow: 0 0 0 8px rgba(255,255,255,0.07), 0 16px 48px rgba(0,0,0,0.5);
      margin-bottom: 20px;
      display: block;
    }
    .avatar-ph {
      width: 120px; height: 120px;
      border-radius: 50%;
      background: linear-gradient(135deg, #6366f1, #a78bfa);
      font-size: 48px;
      display: flex; align-items: center; justify-content: center;
      border: 3.5px solid rgba(255,255,255,0.85);
      box-shadow: 0 0 0 8px rgba(255,255,255,0.07), 0 16px 48px rgba(0,0,0,0.5);
      margin-bottom: 20px;
    }

    /* Name & Bio */
    .name {
      font-size: 30px; font-weight: 700;
      color: #ffffff;
      letter-spacing: -0.7px;
      text-align: center;
      margin-bottom: 8px;
    }
    .bio {
      font-size: 16px;
      color: rgba(255,255,255,0.58);
      text-align: center;
      line-height: 1.5;
      max-width: 280px;
      margin-bottom: 28px;
    }

    /* Stats row */
    .stats-row {
      display: flex;
      align-items: stretch;
      gap: 1px;
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 18px;
      overflow: hidden;
      width: 100%;
      max-width: 340px;
      margin-bottom: 28px;
    }
    .stat {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 16px 8px;
      background: rgba(255,255,255,0.06);
      gap: 4px;
    }
    .stat + .stat { border-left: 1px solid rgba(255,255,255,0.1); }
    .stat-num {
      font-size: 22px; font-weight: 700;
      color: #ffffff;
      letter-spacing: -0.5px;
      line-height: 1;
    }
    .stat-stars { color: #fbbf24; font-size: 14px; }
    .stat-label {
      font-size: 11px; font-weight: 500;
      color: rgba(255,255,255,0.4);
      text-align: center;
      line-height: 1.3;
    }

    /* Reviews */
    .reviews {
      width: 100%; max-width: 340px;
      margin-bottom: 28px;
    }
    .reviews-label {
      font-size: 11px; font-weight: 700;
      color: rgba(255,255,255,0.28);
      text-transform: uppercase;
      letter-spacing: 1.2px;
      margin-bottom: 10px;
      text-align: left;
    }
    .review {
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 16px;
      padding: 14px 16px;
      margin-bottom: 8px;
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
    }
    .review:last-child { margin-bottom: 0; }
    .review-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; }
    .reviewer { font-size: 14px; font-weight: 600; color: rgba(255,255,255,0.88); }
    .review-stars { color: #fbbf24; font-size: 12px; letter-spacing: 1.5px; }
    .review-body { font-size: 14px; color: rgba(255,255,255,0.52); line-height: 1.5; }

    /* CTA - at bottom */
    .cta {
      display: block;
      width: 100%; max-width: 340px;
      background: #ffffff;
      color: #312e81;
      text-decoration: none;
      padding: 17px 24px;
      border-radius: 18px;
      font-size: 17px; font-weight: 700;
      text-align: center;
      letter-spacing: -0.2px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.25);
      transition: transform 0.12s ease, box-shadow 0.12s ease;
      margin-bottom: 28px;
    }
    .cta:hover { transform: translateY(-2px); box-shadow: 0 14px 40px rgba(0,0,0,0.3); }
    .cta:active { transform: scale(0.97); }

    /* Footer */
    .footer {
      font-size: 13px;
      color: rgba(255,255,255,0.22);
      text-align: center;
    }

    /* Loading */
    .spinner-wrap { display: flex; flex-direction: column; align-items: center; gap: 16px; }
    .spinner {
      width: 36px; height: 36px;
      border: 2.5px solid rgba(255,255,255,0.12);
      border-top-color: rgba(255,255,255,0.7);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-text { font-size: 15px; color: rgba(255,255,255,0.4); }
    .error-text { font-size: 15px; color: rgba(255,255,255,0.4); text-align: center; padding: 40px 20px; }
  </style>
</head>
<body>
  <div id="root">
    <div class="spinner-wrap">
      <div class="spinner"></div>
      <p class="loading-text">Loading profile&hellip;</p>
    </div>
  </div>

  <script>
  (function () {
    var ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imx3b21zdHp6bXllZ3BiaWRpYmZtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI4MTA1NjksImV4cCI6MjA4ODM4NjU2OX0.sZBrK88ecSJBstXNBa2UUAHhBxNfy9-Ssac1JPY9i2k';
    var APP_STORE = 'https://apps.apple.com/app/id6758919822';

    var id = window.location.hash.slice(1);
    if (!id) { window.location.href = 'https://help-y.com'; return; }

    fetch('https://lwomstzzmyegpbidibfm.supabase.co/functions/v1/profile-page'
      + '?apikey=' + ANON_KEY + '&id=' + encodeURIComponent(id) + '&format=json')
      .then(function (r) { return r.json(); })
      .then(function (d) { d.error ? showError('Profile not found.') : render(d); })
      .catch(function () { showError('Could not load profile.'); });

    function esc(s) {
      return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }
    function stars(r) {
      var f = Math.round(r);
      return '&#9733;'.repeat(f) + '&#9734;'.repeat(5-f);
    }

    function render(p) {
      document.title = esc(p.name) + ' on Helpy';

      var avatarHtml = p.avatar
        ? '<img class="avatar" src="' + esc(p.avatar) + '" alt="' + esc(p.name) + '" />'
        : '<div class="avatar-ph">&#x1F9CA;</div>';

      // Stats row — always show all three
      var ratingDisplay = (p.rating && p.ratingCount >= 1)
        ? '<span class="stat-num stat-stars">' + p.rating.toFixed(1) + ' &#9733;</span>'
        : '<span class="stat-num stat-stars">&mdash;</span>';
      var reviewDisplay = '<span class="stat-num">' + (p.ratingCount || 0) + '</span>';
      var helpedDisplay = '<span class="stat-num">' + (p.helpedCount || 0) + '</span>';

      var statsHtml =
        '<div class="stats-row">'
        + '<div class="stat">' + ratingDisplay + '<span class="stat-label">Rating</span></div>'
        + '<div class="stat">' + reviewDisplay + '<span class="stat-label">Reviews</span></div>'
        + '<div class="stat">' + helpedDisplay + '<span class="stat-label">Neighbors helped</span></div>'
        + '</div>';

      var reviewsHtml = '';
      if (p.reviews && p.reviews.length > 0) {
        reviewsHtml = '<div class="reviews"><p class="reviews-label">What neighbors say</p>';
        p.reviews.forEach(function (r) {
          reviewsHtml +=
            '<div class="review">'
            + '<div class="review-top">'
            + '<span class="reviewer">' + esc(r.rater_name) + '</span>'
            + '<span class="review-stars">' + stars(r.rating) + '</span>'
            + '</div>'
            + '<p class="review-body">' + esc(r.comment) + '</p>'
            + '</div>';
        });
        reviewsHtml += '</div>';
      }

      document.getElementById('root').innerHTML =
        '<p class="wordmark">Helpy</p>'
        + avatarHtml
        + '<h1 class="name">' + esc(p.name) + '</h1>'
        + (p.bio ? '<p class="bio">' + esc(p.bio) + '</p>' : '')
        + statsHtml
        + reviewsHtml
        + '<a class="cta" href="' + APP_STORE + '">Open in Helpy &nbsp;&rarr;</a>'
        + '<p class="footer">Real neighbors helping each other</p>';
    }

    function showError(msg) {
      document.getElementById('root').innerHTML = '<p class="error-text">' + esc(msg) + '</p>';
    }
  })();
  </script>
</body>
</html>
