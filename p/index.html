<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <!-- Force HTTPS — must be first, before any render -->
  <script>if(location.protocol==='http:'){location.replace('https:'+location.href.slice(5));}</script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Helpy Profile</title>
  <meta property="og:title" content="Helpy - Neighborly Help" />
  <meta property="og:description" content="Real neighbors helping each other." />
  <meta property="og:image" content="https://help-y.com/app-icon-512.png" />
  <meta property="og:site_name" content="Helpy" />
  <meta name="twitter:card" content="summary" />
  <meta name="twitter:image" content="https://help-y.com/app-icon-512.png" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", sans-serif;
      background: linear-gradient(160deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 48px 24px;
      -webkit-font-smoothing: antialiased;
    }

    #root {
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 100%;
      max-width: 400px;
      text-align: center;
    }

    /* Glass card on desktop */
    @media (min-width: 600px) {
      body { padding: 60px 40px; }
      #root {
        background: rgba(255,255,255,0.05);
        border: 1px solid rgba(255,255,255,0.1);
        border-radius: 32px;
        padding: 48px 40px 40px;
        backdrop-filter: blur(40px);
        -webkit-backdrop-filter: blur(40px);
        box-shadow: 0 40px 80px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.08);
      }
    }

    .wordmark {
      font-size: 11px;
      font-weight: 800;
      color: rgba(255,255,255,0.28);
      letter-spacing: 3px;
      text-transform: uppercase;
      margin-bottom: 28px;
    }

    .avatar {
      width: 112px; height: 112px;
      border-radius: 50%;
      object-fit: cover;
      border: 3px solid rgba(255,255,255,0.8);
      box-shadow: 0 0 0 6px rgba(255,255,255,0.07), 0 20px 48px rgba(0,0,0,0.55);
      margin-bottom: 18px;
    }
    .avatar-ph {
      width: 112px; height: 112px;
      border-radius: 50%;
      background: linear-gradient(135deg, #6366f1, #a78bfa);
      font-size: 44px;
      display: flex; align-items: center; justify-content: center;
      border: 3px solid rgba(255,255,255,0.8);
      box-shadow: 0 0 0 6px rgba(255,255,255,0.07), 0 20px 48px rgba(0,0,0,0.55);
      margin-bottom: 18px;
    }

    .name {
      font-size: 28px; font-weight: 700;
      color: #fff;
      letter-spacing: -0.6px;
      margin-bottom: 6px;
    }
    .bio {
      font-size: 15px;
      color: rgba(255,255,255,0.52);
      line-height: 1.5;
      max-width: 270px;
      margin-bottom: 16px;
    }

    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      justify-content: center;
      margin-bottom: 24px;
    }
    .chip {
      font-size: 12px; font-weight: 600;
      color: rgba(255,255,255,0.65);
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.13);
      border-radius: 100px;
      padding: 5px 13px;
    }

    .new-badge {
      font-size: 13px; font-weight: 600;
      color: rgba(255,255,255,0.45);
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 100px;
      padding: 6px 18px;
      margin-bottom: 24px;
    }

    .stats-row {
      display: flex;
      align-items: stretch;
      width: 100%;
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 20px;
      overflow: hidden;
      margin-bottom: 24px;
    }
    .stat {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 18px 6px;
      background: rgba(255,255,255,0.05);
      gap: 5px;
    }
    .stat + .stat { border-left: 1px solid rgba(255,255,255,0.08); }
    .stat-val { display: flex; align-items: baseline; gap: 3px; }
    .stat-num {
      font-size: 24px; font-weight: 700;
      color: #fff;
      letter-spacing: -0.8px;
      line-height: 1;
    }
    .stat-star { color: #fbbf24; font-size: 13px; }
    .stat-label {
      font-size: 10px; font-weight: 500;
      color: rgba(255,255,255,0.32);
      text-transform: uppercase;
      letter-spacing: 0.6px;
      line-height: 1.3;
    }

    .reviews { width: 100%; margin-bottom: 24px; text-align: left; }
    .reviews-label {
      font-size: 10px; font-weight: 700;
      color: rgba(255,255,255,0.22);
      text-transform: uppercase;
      letter-spacing: 1.5px;
      margin-bottom: 10px;
    }
    .review {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 14px;
      padding: 12px 14px;
      margin-bottom: 8px;
    }
    .review:last-child { margin-bottom: 0; }
    .review-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }
    .reviewer { font-size: 13px; font-weight: 600; color: rgba(255,255,255,0.85); }
    .review-stars { color: #fbbf24; font-size: 11px; letter-spacing: 1px; }
    .review-body { font-size: 13px; color: rgba(255,255,255,0.48); line-height: 1.5; }

    .badge { display: inline-block; margin-bottom: 10px; }
    .badge img { height: 52px; width: auto; display: block; border-radius: 10px; }

    .footer { font-size: 12px; color: rgba(255,255,255,0.18); }

    .spinner-wrap { display: flex; flex-direction: column; align-items: center; gap: 16px; }
    .spinner {
      width: 32px; height: 32px;
      border: 2px solid rgba(255,255,255,0.1);
      border-top-color: rgba(255,255,255,0.6);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-text { font-size: 14px; color: rgba(255,255,255,0.32); }
    .error-text { font-size: 14px; color: rgba(255,255,255,0.38); padding: 40px 0; }
  </style>
</head>
<body>
  <div id="root">
    <div class="spinner-wrap">
      <div class="spinner"></div>
      <p class="loading-text">Loading&hellip;</p>
    </div>
  </div>

  <script>
  (function () {
    var ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imx3b21zdHp6bXllZ3BiaWRpYmZtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI4MTA1NjksImV4cCI6MjA4ODM4NjU2OX0.sZBrK88ecSJBstXNBa2UUAHhBxNfy9-Ssac1JPY9i2k';
    var APP_STORE = 'https://apps.apple.com/app/id6758919822';
    var CAT = {
      'elderly-care': 'Elderly care', 'borrow': 'Lending', 'giveaway': 'Giveaway',
      'activity': 'Activities', 'tutoring': 'Tutoring', 'pro-advice': 'Pro advice',
      'rides': 'Rides', 'moving': 'Moving', 'errands': 'Errands',
      'technology': 'Tech help', 'language-help': 'Language help', 'other': 'Other'
    };

    var id = window.location.hash.slice(1);
    if (!id) { window.location.href = 'https://help-y.com'; return; }

    fetch('https://lwomstzzmyegpbidibfm.supabase.co/functions/v1/profile-page'
      + '?apikey=' + ANON_KEY + '&id=' + encodeURIComponent(id) + '&format=json')
      .then(function (r) { return r.json(); })
      .then(function (d) { d.error ? showError('Profile not found.') : render(d); })
      .catch(function () { showError('Could not load profile.'); });

    function esc(s) {
      return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }
    function stars(r) {
      var f = Math.round(r); return '&#9733;'.repeat(f) + '&#9734;'.repeat(5-f);
    }

    function render(p) {
      document.title = esc(p.name) + ' on Helpy';

      var avatarHtml = p.avatar
        ? '<img class="avatar" src="' + esc(p.avatar) + '" alt="' + esc(p.name) + '" />'
        : '<div class="avatar-ph">&#x1F9CA;</div>';

      var chipsHtml = '';
      if (p.availableCategories && p.availableCategories.length > 0) {
        chipsHtml = '<div class="chips">'
          + p.availableCategories.slice(0, 4).map(function(c) {
              return '<span class="chip">' + esc(CAT[c] || c) + '</span>';
            }).join('')
          + '</div>';
      }

      var hasStats = (p.ratingCount > 0) || (p.helpedCount > 0);
      var statsHtml;
      if (hasStats) {
        var ratingVal = (p.rating && p.ratingCount >= 1)
          ? '<span class="stat-num">' + p.rating.toFixed(1) + '</span><span class="stat-star">&#9733;</span>'
          : '<span class="stat-num">&#8212;</span>';
        statsHtml =
          '<div class="stats-row">'
          + '<div class="stat"><div class="stat-val">' + ratingVal + '</div><span class="stat-label">Rating</span></div>'
          + '<div class="stat"><div class="stat-val"><span class="stat-num">' + (p.ratingCount||0) + '</span></div><span class="stat-label">Reviews</span></div>'
          + '<div class="stat"><div class="stat-val"><span class="stat-num">' + (p.helpedCount||0) + '</span></div><span class="stat-label">Helped</span></div>'
          + '</div>';
      } else {
        statsHtml = '<div class="new-badge">&#10024; New to Helpy</div>';
      }

      var reviewsHtml = '';
      if (p.reviews && p.reviews.length > 0) {
        reviewsHtml = '<div class="reviews"><p class="reviews-label">What neighbors say</p>';
        p.reviews.forEach(function(r) {
          reviewsHtml +=
            '<div class="review">'
            + '<div class="review-top">'
            + '<span class="reviewer">' + esc(r.rater_name) + '</span>'
            + '<span class="review-stars">' + stars(r.rating) + '</span>'
            + '</div>'
            + '<p class="review-body">' + esc(r.comment) + '</p>'
            + '</div>';
        });
        reviewsHtml += '</div>';
      }

      document.getElementById('root').innerHTML =
        '<p class="wordmark">Helpy</p>'
        + avatarHtml
        + '<h1 class="name">' + esc(p.name) + '</h1>'
        + (p.bio ? '<p class="bio">' + esc(p.bio) + '</p>' : '')
        + chipsHtml
        + statsHtml
        + reviewsHtml
        + '<a class="badge" href="' + APP_STORE + '">'
        + '<img src="https://tools.applemediaservices.com/api/badges/download-on-the-app-store/black/en-us?size=250x83" alt="Download on the App Store" />'
        + '</a>'
        + '<p class="footer">Real neighbors helping each other</p>';
    }

    function showError(msg) {
      document.getElementById('root').innerHTML = '<p class="error-text">' + esc(msg) + '</p>';
    }
  })();
  </script>
</body>
</html>
